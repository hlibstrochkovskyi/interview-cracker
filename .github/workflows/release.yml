name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Build and package
        run: npm run dist
        env:
          # Auto-update publishing + (optional) signing secrets are wired here.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
